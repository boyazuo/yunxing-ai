server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: yunxing-api
  profiles:
    active: dev
  ai:
    model:
      chat: none       # 禁用 Spring AI 自动 ChatModel，由 SpringAIConfig + yxboot.ai 静态配置创建
      embedding: none  # 禁用 Spring AI 自动 EmbeddingModel，同上
      image: none      # 禁用 Spring AI 自动 ImageModel（项目未使用）
    vectorstore:
      type: none       # 禁用 Spring AI 自动 VectorStore，由 VectorStoreRegistry 按知识库动态创建
      qdrant:
        host: localhost
        port: 6334
        use-tls: false
        initialize-schema: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      
      
# JWT配置
jwt:
  secret: yunxing-ai-platform-secret-key-for-jwt-token-with-spring-boot
  expiration: 86400000  # 1天
  header: Authorization
  token-prefix: Bearer

# 日志配置
logging:
  level:
    com.yxboot: INFO
    org.springframework: WARN 

# SpringDoc配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.yxboot.modules
  show-actuator: false

yxboot:
  ai:
    chat:
      provider: zhipuai
      api-key: ""
      model: glm-4-flash
      temperature: 0.7
      top-p: 0.95
      max-tokens: 4096
    embedding:
      provider: zhipuai
      api-key: ""
      model: embedding-3
      dimensions: 2048
    retriever:
      default-limit: 10
      default-min-score: 0.0