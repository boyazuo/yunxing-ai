spring:
  # 数据源
  datasource:
    url: jdbc:mysql://localhost:3306/yxboot?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.jdbc.Driver

  # Redis 若设有密码自行添加配置password
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

  # 邮件配置
  mail:
    host: smtp.example.com # 邮箱服务器地址
    port: 587 #  邮箱服务器端口
    username: your-email@example.com #  邮箱账号
    password: your-password #  邮箱密码
    properties:
      mail:
        smtp:
          auth: true # 开启认证
          starttls: # 开启TLS
            enable: true #  开启
            required: true #  必须

  ai:
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        use-tls: false
        initialize-schema: false

yxboot:
  ai:
    chat:
      provider: zhipuai
      api-key: ""
      model: glm-4-flash
      temperature: 0.7
      top-p: 0.95
      max-tokens: 4096
    embedding:
      provider: dashscope      # dashscope | ollama | zhipuai
      api-key: ${DASHSCOPE_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      model: text-embedding-v4
      dimensions: 1024
      read-timeout-seconds: 60
      batch-size: 10
    retriever:
      default-limit: 10
      default-min-score: 0.0
    rag:
      strict-mode: true
      no-context-response: "抱歉，知识库中未找到与您问题相关的信息，我无法基于现有资料回答该问题。"
      per-dataset-limit: 5
      limit: 10
      min-score: 0.5

  upload:
    model: local
    local:
      enable: true
      path-prefix: /xxx/xxx/xxx/xxx/
      url-prefix: http://ip:port/
      rewrite-file-name: true
    oss:
      enable: true
      endpoint: xxx
      accessKey: xxx
      secretKey: xxx
      bucketName: xxx
      rewrite-file-name: true
