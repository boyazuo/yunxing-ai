spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yxboot}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123456}
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123456}

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  ai:
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:qdrant}
        port: ${QDRANT_PORT:6334}
        use-tls: false
        initialize-schema: false

jwt:
  secret: ${JWT_SECRET:yunxing-ai-platform-secret-key-for-jwt-token-with-spring-boot}
  expiration: ${JWT_EXPIRATION:86400000}

yxboot:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ai:
    chat:
      provider: ${AI_CHAT_PROVIDER:zhipuai}
      api-key: ${AI_CHAT_API_KEY:}
      model: ${AI_CHAT_MODEL:glm-4-flash}
    embedding:
      provider: ${AI_EMBEDDING_PROVIDER:dashscope}
      api-key: ${AI_EMBEDDING_API_KEY:}
      base-url: ${AI_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      model: ${AI_EMBEDDING_MODEL:text-embedding-v4}
      dimensions: ${AI_EMBEDDING_DIMENSIONS:1024}
  upload:
    model: local
    local:
      enable: true
      path-prefix: /data/uploads/
      url-prefix: ${UPLOAD_URL_PREFIX:http://localhost:8080/}
      rewrite-file-name: true
    oss:
      enable: false
