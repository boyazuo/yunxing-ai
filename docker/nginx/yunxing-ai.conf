# 云行 AI - 宿主机 Nginx 站点配置
#
# 安装步骤：
#   sudo cp docker/nginx/yunxing-ai.conf /etc/nginx/sites-available/yunxing-ai
#   sudo ln -sf /etc/nginx/sites-available/yunxing-ai /etc/nginx/sites-enabled/yunxing-ai
#   # 编辑 server_name 为你的域名
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS（推荐）：
#   sudo certbot --nginx -d your-domain.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream yunxing_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream yunxing_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;  # 改为你的域名或服务器 IP

    client_max_body_size 100m;

    # 后端 API
    location /v1/api/ {
        proxy_pass http://yunxing_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式对话
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # Swagger / OpenAPI
    location ~ ^/(swagger-ui|api-docs|v3/api-docs|webjars) {
        proxy_pass http://yunxing_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NextAuth 与前端 API 路由
    location /api/ {
        proxy_pass http://yunxing_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端页面
    location / {
        proxy_pass http://yunxing_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
