name: yunxing-ai

services:
  mysql:
    image: mysql:8.3
    container_name: yunxing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./doc/sql/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yunxing-net

  redis:
    image: redis:7-alpine
    container_name: yunxing-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yunxing-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: yunxing-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - yunxing-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: yunxing-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      UPLOAD_URL_PREFIX: ${UPLOAD_URL_PREFIX}
      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - upload_data:/data/uploads
    ports:
      - "8080:8080"
    networks:
      - yunxing-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: yunxing-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    networks:
      - yunxing-net

networks:
  yunxing-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
  upload_data:
