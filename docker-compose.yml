name: yunxing-ai

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: yunxing-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - yunxing-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: yunxing-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      UPLOAD_URL_PREFIX: ${UPLOAD_URL_PREFIX}
      AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER}
      AI_EMBEDDING_API_KEY: ${AI_EMBEDDING_API_KEY}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - upload_data:/data/uploads
    ports:
      - "8080:8080"
    networks:
      - yunxing-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: yunxing-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    networks:
      - yunxing-net

networks:
  yunxing-net:
    driver: bridge

volumes:
  qdrant_data:
  upload_data:
